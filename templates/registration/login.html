{% load static %}
<!doctype html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entrar — MIKE</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- MIKE skin -->
  <link rel="stylesheet" href="{% static 'mike/css/styles.css' %}">
</head>

<body class="mike-bg">

  <main class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-10 col-md-6 col-lg-5">

        <div class="position-relative mike-card p-4 p-md-5">
          <div class="mike-hud"></div>

          <div class="mb-4 text-center">
            <div class="mike-brand">MIKE</div>
            <div class="h4 mt-2 mb-1">Entrar</div>
            <div class="mike-muted small">Progresso não é feeling. É registro.</div>
          </div>

          {% if form.errors %}
            <div class="alert alert-danger" role="alert">
              Usuário ou senha inválidos. Tente novamente.
            </div>
          {% endif %}

          <form method="post" novalidate>
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label" for="id_username">Usuário</label>
              <input
                type="text"
                name="username"
                autofocus
                autocapitalize="none"
                autocomplete="username"
                class="form-control mike-input"
                id="id_username"
                required
                value="{{ form.username.value|default_if_none:'' }}"
              >
            </div>

            <div class="mb-3">
              <label class="form-label" for="id_password">Senha</label>
              <input
                type="password"
                name="password"
                autocomplete="current-password"
                class="form-control mike-input"
                id="id_password"
                required
              >
            </div>

            {# preserva "para onde ir" depois do login (Django padrão) #}
            {% if next %}
              <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <button class="btn btn-mike w-100 py-2" type="submit">
              Entrar
            </button>
          </form>

        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'mike/js/script.js' %}"></script>
</body>
</html>
