<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions</title>
</head>
<body>
    <section>
        {% for session in sessions %}
            <ul>
                <li><a href="{% url 'training_session' id=session.id %}">{{session.performed_at}} - {{session.session_type}}</a></li>
            </ul>
        {% endfor %}
    </section>
</body>
</html>
