<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions</title>
</head>
<body>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Sair</button>
    </form>
    <section>
        {% for session in sessions %}
            <ul>
                <li><a href="{% url 'training:training_session_detail' pk=session.pk %}">{{session.performed_at}} - {{session.session_type}}</a>
                 - {{ session.exercise_count }} exercícios / {{ session.set_count }} séries</li>
            </ul>
        {% endfor %}

        <a href="{% url 'training:training_session_create' %}">Nova Sessão</a>
    </section>
</body>
</html>
