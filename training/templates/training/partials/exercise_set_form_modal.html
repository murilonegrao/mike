<form method="post" class="m-form" action="{{ action_url }}">
    {% csrf_token %}

    {% if recent_sets %}
    <div class="m-card p-2 mb-3">
        <div class="d-flex align-items-center justify-content-between">
            <div class="m-title">Últimas séries</div>
            <span class="m-text-muted small">({{ recent_sets|length }})</span>
        </div>
        <div class="m-divider my-2"></div>

        <div class="d-grid gap-2">
            {% for rs in recent_sets %}
            <div class="m-set-row">
                <div class="m-text-muted small">Série {{ rs.order }}</div>
                <div class="m-mono fw-bold">{{ rs }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    {{ form.as_p }}

    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="m-btn-primary w-100">
            {{ submit_label|default:"Salvar" }}
        </button>

        <button type="button" class="m-btn-secondary w-100" data-bs-dismiss="modal">
            Finalizar
        </button>
    </div>

    <div class="m-text-muted small mt-2">
        Dica: adicione várias séries e finalize quando terminar o exercício.
    </div>
</form>
