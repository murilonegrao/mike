<form method="post"
      action="{% url 'training:exercise_set_delete' session_exercise_pk=session_exercise.pk pk=exercise_set.pk %}">
  {% csrf_token %}

  <p class="m-text-muted mb-0">
    Excluir a série <strong>{{ exercise_set.order }}</strong>?
    Isso não poderá ser desfeito.
  </p>

  <div class="d-flex gap-2 mt-3">
    <button type="submit" class="m-btn-danger w-100">Excluir</button>
    <button type="button" class="m-btn-secondary w-100" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>
